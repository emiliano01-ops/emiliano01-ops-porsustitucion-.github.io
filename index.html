<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integrales por Sustitución</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#1e293b;
    padding:25px;
    border-radius:15px;
}

input{
    width:100%;
    padding:15px;
    font-size:20px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.paso{
    background:white;
    color:black;
    margin-top:15px;
    padding:15px;
    border-radius:10px;
}

.resultado{
    margin-top:20px;
    background:#22c55e;
    padding:20px;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>📘 Integrales por Sustitución</h1>

<input id="funcion"
placeholder="Ejemplo: (2x+3)^2"
value="(2x+3)^2">

<button onclick="resolver()">Resolver</button>

<div id="pasos"></div>
<div id="resultado"></div>

</div>

<script>

function resolver(){

let f = document.getElementById("funcion").value.replace(/\s/g,"");

let pasos = `
<div class="paso">
<b>MÉTODO DE SUSTITUCIÓN</b><br><br>

1. Identificar función interna u<br>
2. Calcular du<br>
3. Reescribir integral en u<br>
4. Integrar<br>
5. Regresar a x
</div>
`;

let resultado = "";

try{

// detectar (ax+b)^n
let match = f.match(/\(([^)]+)\)\^(\d+)/);

if(!match){

document.getElementById("resultado").innerHTML =
"<div class='paso'>Solo se admite (ax+b)^n</div>";
return;
}

let inner = match[1];
let n = parseInt(match[2]);

// detectar ax+b
let coefX = 0;
let constante = 0;

let parts = inner.split("x");

if(parts[0]==="") coefX = 1;
else if(parts[0]==="-") coefX = -1;
else coefX = parseFloat(parts[0]);

if(parts[1]){
constante = parseFloat(parts[1]);
}

pasos += `
<div class="paso">
<b>Paso 1: Identificar u</b><br><br>

u = ${inner}
</div>
`;

pasos += `
<div class="paso">
<b>Paso 2: Derivar u</b><br><br>

du/dx = ${coefX}<br>
du = ${coefX} dx
</div>
`;

let newExp = n + 1;
let coefFinal = 1 / newExp;

pasos += `
<div class="paso">
<b>Paso 3: Aplicar fórmula</b><br><br>

∫ u^n du = u^(n+1)/(n+1)
</div>
`;

resultado = `${coefFinal}(${inner})^${newExp}`;

pasos += `
<div class="paso">
<b>Paso 4: Sustituir resultado</b><br><br>

${resultado}
</div>
`;

pasos += `
<div class="paso">
<b>Paso 5: Resultado final</b><br><br>

∫ ${f} dx = ${resultado} + C
</div>
`;

document.getElementById("pasos").innerHTML = pasos;

document.getElementById("resultado").innerHTML =
`
<div class="resultado">
Resultado: ${resultado} + C
</div>
`;

}catch(e){

document.getElementById("resultado").innerHTML =
"<div class='paso'>Error en la expresión</div>";

}

}

resolver();

</script>

</body>
</html>
